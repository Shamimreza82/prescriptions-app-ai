services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: pres_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pres_manage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pres_user -d pres_manage"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pres_user:${DB_PASSWORD}@db:5432/pres_manage
      FRONTEND_URL: http://123.136.30.206:3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://123.136.30.206:5000/api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
  backend_logs:
