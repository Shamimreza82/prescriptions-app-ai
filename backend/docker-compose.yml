version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: reza
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pres_manage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reza -d pres_manage"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs

volumes:
  postgres_data:
  app_uploads:
  app_logs:
